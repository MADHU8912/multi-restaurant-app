<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #faf7f2; padding: 20px; }
    .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    input, button, select { margin: 8px 0; padding: 10px; width: 100%; box-sizing: border-box; }
    button { background: #8b1e1e; color: white; border: none; }
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>

  <div class="box">
    <h2>Add Menu Item</h2>
    <input id="restaurant_id" placeholder="Restaurant ID" />
    <input id="food_name" placeholder="Food Name" />
    <input id="category" placeholder="Category" />
    <input id="price" placeholder="Price" />
    <button onclick="addMenuItem()">Add Item</button>
  </div>

  <div class="box">
    <h2>Upload Restaurant Logo</h2>
    <input id="logo_restaurant_id" placeholder="Restaurant ID" />
    <input id="logoFile" type="file" />
    <button onclick="uploadLogo()">Upload Logo</button>
  </div>

  <div class="box">
    <h2>Update Order Status</h2>
    <input id="order_id" placeholder="Order ID" />
    <select id="order_status">
      <option value="placed">placed</option>
      <option value="confirmed">confirmed</option>
      <option value="preparing">preparing</option>
      <option value="out_for_delivery">out_for_delivery</option>
      <option value="delivered">delivered</option>
    </select>
    <select id="payment_status">
      <option value="pending">pending</option>
      <option value="paid">paid</option>
      <option value="failed">failed</option>
    </select>
    <button onclick="updateOrderStatus()">Update Order</button>
  </div>

  <script>
    async function addMenuItem() {
      const body = {
        restaurant_id: document.getElementById("restaurant_id").value,
        name: document.getElementById("food_name").value,
        category: document.getElementById("category").value,
        price: document.getElementById("price").value
      };

      const res = await fetch("http://localhost:5000/api/menu", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      alert("Added: " + JSON.stringify(data));
    }

    async function uploadLogo() {
      const restaurantId = document.getElementById("logo_restaurant_id").value;
      const fileInput = document.getElementById("logoFile");
      const formData = new FormData();
      formData.append("logo", fileInput.files[0]);

      const res = await fetch(`http://localhost:5000/api/restaurants/${restaurantId}/logo`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      alert("Logo uploaded: " + JSON.stringify(data));
    }

    async function updateOrderStatus() {
      const orderId = document.getElementById("order_id").value;
      const body = {
        order_status: document.getElementById("order_status").value,
        payment_status: document.getElementById("payment_status").value
      };

      const res = await fetch(`http://localhost:5000/api/orders/${orderId}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      alert("Updated: " + JSON.stringify(data));
    }
  </script>
</body>
</html>
